<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Ring Gradient -->
    <linearGradient id="ring-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Rounded rect base with dark gradient and subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bg-grad)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="8" />

  <!-- Compass / Network Outer Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#accent-grad)" stroke-width="8" stroke-dasharray="12 18" />
  
  <!-- Outer Ring ticks (North, East, South, West) -->
  <line x1="256" y1="40" x2="256" y2="52" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" />
  <line x1="256" y1="460" x2="256" y2="472" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" />
  <line x1="40" y1="256" x2="52" y2="256" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" />
  <line x1="460" y1="256" x2="472" y2="256" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" />

  <!-- Inner Connections (Git branches style) -->
  <!-- Connection Paths -->
  <path d="M 256 120 L 150 350" stroke="#f1f5f9" stroke-width="20" stroke-linecap="round" />
  <path d="M 256 120 L 362 350" stroke="#f1f5f9" stroke-width="20" stroke-linecap="round" />
  <path d="M 150 350 L 362 350" stroke="#f1f5f9" stroke-width="20" stroke-linecap="round" />
  <path d="M 256 120 L 256 350" stroke="#f1f5f9" stroke-width="14" stroke-dasharray="10 12" />

  <!-- Git Nodes -->
  <!-- Top Node (Source) -->
  <circle cx="256" cy="120" r="32" fill="url(#accent-grad)" stroke="#ffffff" stroke-width="8" />
  
  <!-- Middle Intersection Node -->
  <circle cx="256" cy="245" r="24" fill="#38bdf8" stroke="#ffffff" stroke-width="6" />

  <!-- Left Node -->
  <circle cx="150" cy="350" r="36" fill="url(#accent-grad)" stroke="#ffffff" stroke-width="8" />
  
  <!-- Right Node -->
  <circle cx="362" cy="350" r="36" fill="url(#accent-grad)" stroke="#ffffff" stroke-width="8" />

  <!-- Center Core Pin -->
  <circle cx="256" cy="245" r="8" fill="#ffffff" />
</svg>